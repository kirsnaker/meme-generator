<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Генератор | Если бы ... был ... то он бы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0f1724;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eef2ff;
        }

        /* Карточка */
        .generator-card {
            max-width: 880px;
            width: 100%;
            background: #111827;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(75, 85, 99, 0.3);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Шапка */
        .card-header {
            background: #1e293b;
            padding: 1.6rem 2rem;
            border-bottom: 1px solid #334155;
        }

        .card-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(120deg, #c084fc, #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
        }

        .card-header .sub {
            color: #94a3b8;
            font-size: 0.9rem;
            font-weight: 400;
            border-left: 3px solid #3b82f6;
            padding-left: 0.75rem;
            margin-top: 0.25rem;
        }

        /* Основной контент */
        .card-content {
            padding: 2rem;
        }

        /* Поле ввода имени */
        .field-group {
            margin-bottom: 2rem;
        }

        .field-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
            margin-bottom: 0.5rem;
        }

        .field-group input {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            font-family: inherit;
            color: #f1f5f9;
            transition: all 0.2s;
            outline: none;
        }

        .field-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: #0f172a;
        }

        /* Выбор профессии (сетка) */
        .profession-section {
            margin-bottom: 2rem;
        }

        .profession-section .label {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
            margin-bottom: 0.8rem;
        }

        .prof-buttons-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
        }

        .prof-btn {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.15s;
        }

        .prof-btn:hover {
            background: #2d3a52;
            border-color: #5b6e8c;
            color: white;
        }

        .prof-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        /* Кнопка генерации */
        .generate-btn {
            width: 100%;
            background: #3b82f6;
            border: none;
            border-radius: 1.2rem;
            padding: 0.9rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            margin-bottom: 2rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .generate-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .generate-btn:active {
            transform: translateY(1px);
        }

        /* Блок результата */
        .result-panel {
            background: #0f172a;
            border-radius: 1.5rem;
            border: 1px solid #2d3a52;
            overflow: hidden;
        }

        .result-header {
            background: #1e293b;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #2d3a52;
        }

        .intro-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: #e2e8f0;
            word-break: break-word;
        }

        .intro-text span {
            color: #facc15;
            font-weight: 600;
            background: #1e293b;
            padding: 0.1rem 0.3rem;
            border-radius: 0.5rem;
        }

        .points-list {
            list-style: none;
            padding: 1.2rem 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .points-list li {
            background: #1a2538;
            padding: 0.9rem 1.2rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.45;
            color: #e2e8f0;
            border-left: 4px solid #3b82f6;
            transition: 0.1s;
        }

        .footer-note {
            margin-top: 1rem;
            font-size: 0.7rem;
            text-align: center;
            color: #5b6e8c;
            border-top: 1px solid #1e293b;
            padding-top: 1rem;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .card-content {
                padding: 1.5rem;
            }
            .intro-text {
                font-size: 0.95rem;
            }
            .prof-btn {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
            }
            .points-list li {
                font-size: 0.85rem;
                padding: 0.75rem 1rem;
            }
        }
    </style>
</head>
<body>
<div class="generator-card">
    <div class="card-header">
        <h1>Конструктор профессий</h1>
        <div class="sub">Юмор</div>
    </div>
    <div class="card-content">
        <div class="field-group">
            <label>имя</label>
            <input type="text" id="personName" placeholder="например: Хомяк, Сосед, Друг" value="">
        </div>

        <div class="profession-section">
            <div class="label">выберите профессию</div>
            <div class="prof-buttons-grid" id="professionButtonsContainer"></div>
        </div>

        <button class="generate-btn" id="generateBtn">Сгенерировать</button>

        <div class="result-panel">
            <div class="result-header">
                <div class="intro-text" id="introPreview">Если бы [имя] был [профессия], то он бы...</div>
            </div>
            <ul class="points-list" id="pointsList">
                <li>нажмите на кнопку, чтобы создать абсурдные сценарии</li>

        <div class="footer-note">
            пункты не повторяются в рамках одной генерации | база данных более 120 уникальных вариантов

    </div>
</div>

    // Доступные профессии (все ключи)
    const availableProfessions = Object.keys(jokesDatabase);

    // Текущая выбранная профессия
    let currentProfession = "блогер";

    // -------- рендер кнопок профессий ----------
    const container = document.getElementById("professionButtonsContainer");
    function renderProfessionButtons() {
        container.innerHTML = "";
        availableProfessions.forEach(prof => {
            const button = document.createElement("button");
            button.classList.add("prof-btn");
            if (prof === currentProfession) button.classList.add("active");
            // Первая буква заглавная для красоты
            const displayName = prof.charAt(0).toUpperCase() + prof.slice(1);
            button.textContent = displayName;
            button.addEventListener("click", () => {
                currentProfession = prof;
                document.querySelectorAll(".prof-btn").forEach(btn => btn.classList.remove("active"));
                button.classList.add("active");
                // не генерируем автоматически, чтобы не спамить, только по клику на кнопку генерации
            });
            container.appendChild(button);
        });
    }

    // Получение 5 случайных уникальных пунктов для профессии (без повторов в рамках вызова)
    function getRandomUniqueItems(profession, count = 5) {
        const jokesArray = jokesDatabase[profession];
        if (!jokesArray || jokesArray.length === 0) {
            return [
                "непредвиденная ошибка базы данных",
                "абсурдность не поддаётся генерации",
                "попробуйте другую профессию",
                "этот вариант скрыт во времени",
                "разработчики не предусмотрели такой расклад"
            ];
        }
        // Создаём копию и тасуем (Fisher-Yates)
        const shuffled = [...jokesArray];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    // Функция экранирования для защиты от XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Основная генерация и отображение
    function generateAndDisplay() {
        const rawName = document.getElementById("personName").value;
        const person = rawName.trim() === "" ? "Кто-то" : rawName.trim();
        const profession = currentProfession;

        // Получаем 5 пунктов
        const points = getRandomUniqueItems(profession, 5);

        // Обновляем заголовок
        const introEl = document.getElementById("introPreview");
        introEl.innerHTML = `Если бы <span>${escapeHtml(person)}</span> был <span>${escapeHtml(profession.toUpperCase())}</span>, то он бы...`;

        // Обновляем список
        const pointsList = document.getElementById("pointsList");
        pointsList.innerHTML = "";
        for (let point of points) {
            const li = document.createElement("li");
            li.textContent = point;
            pointsList.appendChild(li);
        }

        // Маленькая визуальная реакция
        const resultPanel = document.querySelector(".result-panel");
        resultPanel.style.transform = "scale(0.99)";
        setTimeout(() => { resultPanel.style.transform = ""; }, 120);
    }

    // Инициализация интерфейса и стартовый показ
    renderProfessionButtons();
    const generateBtn = document.getElementById("generateBtn");
    generateBtn.addEventListener("click", generateAndDisplay);
